# ------------------------------------------
# DATA SOURCE PROPERTIES FOR PRODUCTION
# ------------------------------------------

spring.datasource.url=jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DB}?use8Unicode=yes&characterEncoding=UTF-8&createDatabaseIfNotExist=true&useSSL=true&requireSSL=true
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASS}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# The SQL dialect makes Hibernate generate better SQL for the chosen database
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.datasource.hikari.data-source-properties.useUnicode=true
spring.datasource.hikari.data-source-properties.characterEncoding=UTF-8

# Connection pool settings for production
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

#--------------------------------------
#  tmp_dir
#--------------------------------------
tmp_dir=/tmp/

#--------------------------------------
#URL
#--------------------------------------
game.frontend.base.url=${FRONTEND_URL:http://localhost:3000}

# --------------------------------------------------------------------------------------------------------------------------------------------------------------
# AWS SES
# --------------------------------------------------------------------------------------------------------------------------------------------------------------
spring.mail.host=email-smtp.ap-southeast-1.amazonaws.com
spring.mail.username=${SES_USERNAME:}
spring.mail.password=${SES_PASSWORD:}
mail.from=${MAIL_FROM:}
spring.mail.port=587
spring.mail.properties.mail.smtp.ssl.trust=email-smtp.ap-southeast-1.amazonaws.com
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.transport.protocol=smtp
spring.mail.properties.mail.debug=false

# --------------------------------------------------------------------------------------------------------------------------------------------------------------
# LOGGING CONFIGURATION FOR PRODUCTION
# --------------------------------------------------------------------------------------------------------------------------------------------------------------
logging.level.root=INFO
logging.level.lk.learnfi.sample_game_01=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# CloudWatch logging
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# --------------------------------------------------------------------------------------------------------------------------------------------------------------
# PERFORMANCE TUNING
# --------------------------------------------------------------------------------------------------------------------------------------------------------------
# JVM settings for production
server.tomcat.max-threads=200
server.tomcat.min-spare-threads=10
server.tomcat.accept-count=100
server.tomcat.max-connections=8192

# Cache settings
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=600s

# --------------------------------------------------------------------------------------------------------------------------------------------------------------
# SECURITY SETTINGS
# --------------------------------------------------------------------------------------------------------------------------------------------------------------
# CORS settings for production
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:}
cors.allowed.methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed.headers=*
cors.allow.credentials=true

# JWT settings
jwt.secret=${JWT_SECRET:your-secret-key-change-in-production}
jwt.expiration=86400000

# --------------------------------------------------------------------------------------------------------------------------------------------------------------
# MONITORING AND HEALTH CHECKS
# --------------------------------------------------------------------------------------------------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.db.enabled=true
management.health.diskspace.enabled=true
management.health.diskspace.threshold=10MB

# Actuator security
management.security.enabled=true